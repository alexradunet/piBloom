# Bloom reverse proxy — route subdomains to backend services
# Installed to /etc/nginx/conf.d/bloom.conf

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Default: status page on bare hostname
server {
    listen 80 default_server;
    server_name pibloom.netbird.cloud;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

# dufs WebDAV file server
server {
    listen 80;
    server_name files.pibloom.netbird.cloud;

    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
