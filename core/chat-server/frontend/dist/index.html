<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pi</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0d1117;
      }
      body {
        min-height: 100vh;
      }
      #app {
        min-height: 100vh;
      }
      #nixpi-shell {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(22rem, 1fr);
        min-height: 100vh;
        background: #0d1117;
      }
      #chat-pane,
      #terminal-pane {
        min-height: 0;
      }
      #chat-pane {
        border-right: 1px solid #30363d;
      }
      #chat-pane > * {
        display: block;
        width: 100%;
        height: 100%;
      }
      #terminal-pane {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        background: #010409;
      }
      #terminal-pane header {
        padding: 0.9rem 1rem;
        border-bottom: 1px solid #30363d;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8b949e;
      }
      #terminal-pane iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }
      @media (max-width: 1100px) {
        #nixpi-shell {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(0, 1fr) minmax(20rem, 40vh);
        }
        #chat-pane {
          border-right: 0;
          border-bottom: 1px solid #30363d;
        }
      }
    </style>
